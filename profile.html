<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suai Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <!-- 語言切換 -->
  <div class="language-switch">
    <span>中文</span>
    <label class="switch">
      <input type="checkbox" id="language-toggle">
      <span class="slider"></span>
    </label>
    <span>English</span>
  </div>

  <!-- 上傳紀錄 -->
  <section class="upload-history">
    <h2 id="history-title">Upload History</h2>
    <div id="history-list" class="history-container"></div>
    <a href="#" id="show-all" class="hidden">▼ Show Full History</a>
  </section>

  <!-- 上傳區塊 -->
  <div class="upload-section">
    <div class="upload-trigger" onclick="toggleUploadForm()">
      <div class="upload-header">我要提供程式碼</div>
    </div>  
    
    <form id="upload-form" class="hidden">
      <!-- 必填欄位 -->
      <div class="form-group required">
        <label for="contract-address">智能合約地址</label>
        <input type="text" id="contract-address" placeholder="請輸入智能合約地址" required>
      </div>

      <div class="form-group required">
        <label for="project-name">專案名稱</label>
        <input type="text" id="project-name" placeholder="請輸入專案名稱" required>
      </div>
    
      <div class="form-group required">
        <label for="contract-description">合約功能描述</label>
        <textarea id="contract-description" placeholder="請輸入合約功能描述" rows="3" required></textarea>
      </div>
    
      <div class="form-group required">
        <label for="code-snippet">程式碼</label>
        <textarea id="code-snippet" placeholder="請輸入程式碼" rows="10" required></textarea>
      </div>
    
      <!-- 授權條款 -->
      <div class="terms">
        <a href="#" onclick="toggleTerms(event)">上傳即表示同意條款</a>
        <div id="terms-content" class="hidden">
          <!-- 條款內容 -->
          此處可填寫授權條款內容。
        </div>
      </div>
    
      <!-- 確定上傳按鈕 -->
      <button type="button" onclick="submitForm()" id="submit-btn">確認上傳</button>
    </form>
  </div>
  
  <script src="profile.js"></script>
</body>
</html>
